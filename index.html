<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- sidebar -->
    <div class="sidebar">
        <img src="photos/spotify logo.jpg" class="logoImg" alt="Logo">
        <a>Home</a>
        <a>Search</a>
        <a>Your Library</a>
    </div>

    <!-- main content -->
    <div class="main">
        <h1>Trending</h1>

        <div class="cards">

            <div class="card" onclick="playSong('the weeknd.mp3', 'The Weeknd')">
                <img src="photos/the weeknd.jpg" alt="The Weeknd">
                <h3>The Weeknd</h3>
            </div>

            <div class="card" onclick="playSong('slimane.mp3', 'Slimane')">
                <img src="photos/slimane.jpg" alt="Slimane">
                <h3>Slimane</h3>
            </div>

            <div class="card" onclick="playSong('gims.mp3', 'Gims')">
                <img src="photos/gims.jpg" alt="Gims">
                <h3>Gims</h3>
            </div>

        </div>
    </div>

    <!-- player -->
    <div class="player">
        <div class="playerLeft">
            <p id="nowPlaying">No song playing</p>
        </div>

        <div class="playerCenter">
            <button class="controlBtn" onclick="prevSong()">⏮</button>
            <button class="controlBtn playBtn" onclick="togglePlay()" id="playBtn">▶</button>
            <button class="controlBtn" onclick="nextSong()">⏭</button>
        </div>

        <div class="playerRight">
            <input type="range" id="volume" min="0" max="1" step="0.01" value="1" onchange="setVolume()">
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
